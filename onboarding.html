<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Quick Setup</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app-shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: rgba(21, 21, 21, 0.95);
            --muted: #8f8f8f;
            --text: #f4f4f4;
            --gold-1: #d4af37;
            --gold-2: #ffd700;
            --danger: #ff6b6b;
            --line: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 20% 0%, rgba(212,175,55,0.12), transparent 28%), var(--bg);
            color: var(--text);
            padding: 18px;
            display: grid;
            place-items: center;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            padding: 24px;
        }

        .chip {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
            color: #111;
            margin-bottom: 18px;
        }

        .title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 16px;
            font-size: 0.98rem;
        }

        .progress {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .dot {
            height: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            transition: background 0.25s ease;
        }

        .dot.active {
            background: linear-gradient(90deg, var(--gold-1), var(--gold-2));
        }

        .field-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.35);
            color: var(--text);
            padding: 14px 15px;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        input:focus {
            outline: none;
            border-color: rgba(212,175,55,0.65);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }

        .helper {
            color: var(--muted);
            font-size: 0.84rem;
            margin-top: 8px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .option {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            text-align: left;
        }

        .option.selected {
            border-color: rgba(212,175,55,0.7);
            background: rgba(212,175,55,0.12);
        }

        .option-top {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .option-text {
            color: var(--muted);
            line-height: 1.4;
            font-size: 0.87rem;
        }

        .error {
            color: var(--danger);
            min-height: 22px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            padding: 12px 16px;
            cursor: pointer;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #ddd;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
            color: #111;
            margin-left: auto;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 700px) {
            .card { padding: 18px; border-radius: 18px; }
            .option-grid { grid-template-columns: 1fr; }
            .footer { flex-direction: column-reverse; }
            .btn, .btn-primary { width: 100%; margin-left: 0; }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
</head>
<body>
    <div id="root"></div>
    <script src="./onboarding-app.bundle.js"></script>
    <script src="/register-sw.js"></script>
</body>
</html>
