<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings Goal - Financial App</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./app-shared.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px 48px; }
    .main-nav {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; padding: 8px;
      border-radius: 16px; background: rgba(26, 26, 26, 0.65); border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .nav-link {
      text-decoration: none; color: #9a9a9a; padding: 10px 16px; border-radius: 10px;
      font-size: 14px; font-weight: 600; transition: all .2s ease;
    }
    .nav-link:hover { color: #d4af37; background: rgba(212, 175, 55, 0.1); }
    .nav-link.active { color: #0a0a0a; background: linear-gradient(135deg, #d4af37 0%, #f5cf55 100%); }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: clamp(2rem, 4vw, 2.6rem); margin-bottom: 8px; color: #fff; letter-spacing: -0.02em; }
    .page-header p { color: #9d9d9d; max-width: 760px; line-height: 1.6; }
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 18px; align-items: start; }
    .card {
      background: linear-gradient(145deg, rgba(24, 24, 24, 0.95), rgba(18, 18, 18, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 20px;
    }
    .card h2 { font-size: 1.1rem; color: #fff; margin-bottom: 12px; }
    .form-grid { display: grid; gap: 10px; }
    label { font-size: 0.8rem; color: #9e9e9e; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03); color: #fff; font-family: inherit;
    }
    input:focus { outline: none; border-color: rgba(212,175,55,0.45); box-shadow: 0 0 0 3px rgba(212,175,55,0.12); }
    .btn {
      border: none; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 700;
      background: linear-gradient(135deg, #d4af37 0%, #f5cf55 100%); color: #0a0a0a;
    }
    .btn.ghost {
      background: rgba(255,255,255,0.03); color: #e8e8e8; border: 1px solid rgba(255,255,255,0.14);
    }
    .btn.ghost:hover { border-color: rgba(212,175,55,0.35); background: rgba(212,175,55,0.08); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .goals { display: grid; gap: 14px; }
    .goal-title { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; margin-bottom: 10px; }
    .goal-title h3 { color: #fff; font-size: 1.02rem; }
    .goal-target { color: #c8a948; font-weight: 700; font-size: 0.9rem; }
    .progress-wrap { margin: 12px 0; }
    .progress-track { width: 100%; height: 10px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #d4af37 0%, #f5cf55 100%); }
    .metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
    .metric { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px; }
    .metric-label { font-size: 0.75rem; color: #9b9b9b; margin-bottom: 6px; }
    .metric-value { font-size: 1rem; font-weight: 700; color: #fff; }
    .mini-history { margin-top: 10px; display: grid; gap: 6px; }
    .history-row { display: flex; justify-content: space-between; font-size: 0.82rem; color: #afafaf; }
    .history-row strong { font-weight: 700; }
    .add { color: #6fcf7b; }
    .deduct { color: #ff8a8a; }
    .empty-state { color: #a6a6a6; text-align: center; padding: 24px 10px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 12px; }
    .helper { color: #9a9a9a; font-size: 0.84rem; margin-top: 8px; line-height: 1.4; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .main-nav { display: none; }
      .container { padding-top: 24px; }
      .metric-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./savings-goal-app.js"></script>
</body>
</html>
