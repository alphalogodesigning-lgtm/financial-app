<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Welcome</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app-shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap');

        :root {
            --black:     #0a0a0a;
            --surface:   #141414;
            --surface-2: #1a1a1a;
            --gold-1:    #D4AF37;
            --gold-2:    #FFD700;
            --text:      #f0f0f0;
            --muted:     #666;
            --border:    rgba(255,255,255,0.07);
            --success:   #66BB6A;
            --danger:    #FF6B6B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', -apple-system, sans-serif;
            color: var(--text);
            background: var(--black);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle gold grid — matches dashboard vibe */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(212,175,55,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,175,55,0.03) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Gold beam — fires once on load, then gone ── */
        .fx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .beam {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 120%;
            background: linear-gradient(
                180deg,
                transparent    0%,
                transparent   15%,
                rgba(212,175,55,0.6) 40%,
                rgba(255,215,0,1.0) 50%,
                rgba(212,175,55,0.6) 60%,
                transparent   85%,
                transparent  100%
            );
            animation: beam-sweep 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        /* Wide soft halo around the beam */
        .beam::before {
            content: '';
            position: absolute;
            inset: 0;
            width: 280px;
            left: 50%;
            transform: translateX(-50%);
            background: inherit;
            filter: blur(48px);
            opacity: 0.3;
        }

        @keyframes beam-sweep {
            0%   { opacity: 0;    transform: translateX(-50%) translateY(-8%) scaleY(0.5); }
            20%  { opacity: 1; }
            55%  { opacity: 0.9;  transform: translateX(-50%) translateY(0%)   scaleY(1); }
            100% { opacity: 0;    transform: translateX(-50%) translateY(4%)   scaleY(1.05); }
        }

        /* ── Layout ── */
        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 460px;
            padding: 40px 36px 36px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: linear-gradient(
                160deg,
                rgba(26,26,26,0.96) 0%,
                rgba(14,14,14,0.99) 100%
            );
            backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(212,175,55,0.06),
                0 40px 80px rgba(0,0,0,0.7);
            animation: card-rise 0.55s 0.15s cubic-bezier(0.4,0,0.2,1) both;
        }

        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Gold top-edge accent line */
        .card::before {
            content: '';
            display: block;
            height: 1px;
            margin: -40px -36px 36px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
            border-radius: 24px 24px 0 0;
        }

        /* ── Brand chip ── */
        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #0a0a0a;
            padding: 5px 13px 5px 9px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(212,175,55,0.35);
            animation: slide-in 0.45s 0.5s cubic-bezier(0.4,0,0.2,1) both;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Heading ── */
        h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-weight: 400;
            font-size: clamp(30px, 5.5vw, 42px);
            line-height: 1.06;
            letter-spacing: -0.02em;
            color: #fff;
            animation: fade-up 0.45s 0.6s cubic-bezier(0.4,0,0.2,1) both;
        }

        h1 em {
            font-style: italic;
            background: linear-gradient(135deg, var(--gold-1) 0%, var(--gold-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Subtitle ── */
        p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 14.5px;
            line-height: 1.55;
            font-weight: 500;
            animation: fade-up 0.45s 0.68s cubic-bezier(0.4,0,0.2,1) both;
        }

        /* ── Thin gold divider ── */
        .divider {
            margin: 22px 0 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.18), transparent);
            animation: fade-up 0.45s 0.72s cubic-bezier(0.4,0,0.2,1) both;
        }

        /* ── Tab switcher ── */
        .tabs {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            padding: 4px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            animation: fade-up 0.45s 0.76s cubic-bezier(0.4,0,0.2,1) both;
        }

        .tab {
            padding: 11px 10px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.15s ease;
            letter-spacing: 0.01em;
        }

        .tab:hover:not(:disabled) { color: #ccc; }

        .tab.active {
            background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
            color: #0a0a0a;
            box-shadow: 0 3px 14px rgba(212,175,55,0.32);
        }

        /* ── Form ── */
        form {
            margin-top: 18px;
            animation: fade-up 0.45s 0.8s cubic-bezier(0.4,0,0.2,1) both;
        }

        .field {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.45);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field::placeholder { color: rgba(255,255,255,0.2); }

        .field:focus {
            border-color: rgba(212,175,55,0.55);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.09);
        }

        /* ── Submit button ── */
        .primary {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.02em;
            color: #0a0a0a;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
            box-shadow: 0 8px 28px rgba(212,175,55,0.32);
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(212,175,55,0.44);
            filter: brightness(1.05);
        }

        .primary:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 4px 14px rgba(212,175,55,0.28);
        }

        /* ── Disabled states ── */
        .primary:disabled,
        .tab:disabled,
        .field:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ── Account success box ── */
        .account-box {
            margin-top: 16px;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(102,187,106,0.22);
            background: rgba(102,187,106,0.07);
            color: #c5f0c8;
            font-size: 13.5px;
            line-height: 1.55;
            font-weight: 500;
        }

        .account-box code {
            background: rgba(0,0,0,0.3);
            padding: 2px 7px;
            border-radius: 6px;
            color: #a8f0b0;
            font-size: 12.5px;
        }

        /* ── Status line ── */
        .status {
            margin-top: 14px;
            min-height: 20px;
            font-size: 13.5px;
            color: var(--muted);
            font-weight: 500;
        }

        .status.error   { color: var(--danger); }
        .status.success { color: var(--success); }

        /* ── Small helper ── */
        .small {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        a {
            color: var(--gold-1);
            font-weight: 700;
            text-decoration: none;
        }
        a:hover { color: var(--gold-2); }

        /* ── Mobile ── */
        @media (max-width: 520px) {
            .card {
                padding: 32px 22px 28px;
                border-radius: 20px;
            }
            .card::before {
                margin: -32px -22px 32px;
            }
            h1 { font-size: 28px; }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
</head>
<body>
    <div class="fx-layer">
        <div class="beam"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel" src="./auth-app.js"></script>
    <script src="/register-sw.js"></script>
</body>
</html>
