<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - The Therapy Session</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app-shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #E0E0E0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            min-height: 100vh;
            padding: 32px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation - Matching index.html */
        .main-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
            padding: 8px;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            flex-wrap: wrap;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .nav-link {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #888;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 14px;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.08);
            color: #D4AF37;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #0a0a0a;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
        }

        .settings-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .settings-btn:hover {
            background: rgba(156, 39, 176, 0.08);
            color: #9C27B0;
        }

        .current-roast-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            font-size: 14px;
            color: #D4AF37;
            font-weight: 600;
        }

        /* Header - Matching index.html */
        .header {
            margin-bottom: 48px;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .header-subtitle {
            color: #888;
            font-size: 1.125rem;
            font-weight: 400;
        }

        /* Health Score Container */
        .health-score-container {
            margin-bottom: 48px;
            padding: 40px 28px;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .health-circle-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 32px;
        }

        .health-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 10;
        }

        .health-circle-progress {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .health-circle-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .health-grade {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
        }

        .health-score-number {
            font-size: 1.25rem;
            font-weight: 700;
            opacity: 0.7;
        }

        .health-score-label {
            font-size: 1.125rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* Brutal Honesty Box */
        .brutal-box {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.12) 0%, rgba(80, 0, 0, 0.08) 100%);
            border: 2px solid rgba(139, 0, 0, 0.3);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 48px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .brutal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8B0000, #DC143C, #8B0000);
        }

        .brutal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            color: #FF6B6B;
        }

        .brutal-text {
            font-size: 1.125rem;
            line-height: 1.6;
            color: #fff;
            font-weight: 500;
        }

        /* Personality Container */
        .personality-container {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.12) 0%, rgba(103, 58, 183, 0.08) 100%);
            border: 2px solid rgba(156, 39, 176, 0.3);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 48px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .personality-type {
            font-size: 2rem;
            font-weight: 900;
            color: #9C27B0;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .personality-description {
            font-size: 1.125rem;
            color: #E0E0E0;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .personality-traits {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trait {
            padding: 10px 18px;
            background: rgba(156, 39, 176, 0.15);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #CE93D8;
            transition: all 0.2s ease;
        }

        .trait:hover {
            background: rgba(156, 39, 176, 0.25);
            border-color: rgba(156, 39, 176, 0.5);
        }

        /* Insights Grid */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .insight-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        .insight-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .insight-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .insight-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .insight-description {
            font-size: 0.95rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .insight-stat {
            font-size: 2.25rem;
            font-weight: 900;
            color: #D4AF37;
            margin-bottom: 12px;
            line-height: 1;
        }

        .insight-recommendation {
            background: rgba(212, 175, 55, 0.08);
            border-left: 3px solid #D4AF37;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #D4AF37;
            line-height: 1.5;
        }

        /* Achievements */
        .achievements-section {
            margin-bottom: 48px;
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 28px;
            text-align: center;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .achievement {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .achievement.unlocked {
            border-color: rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, rgba(26, 26, 26, 0.9) 100%);
        }

        .achievement.locked {
            opacity: 0.35;
        }

        .achievement:hover:not(.locked) {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .achievement-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .achievement-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 0.8rem;
            color: #888;
        }

        /* Fun Stats */
        .fun-stats-section {
            margin-bottom: 48px;
        }

        .fun-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .fun-stat {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .fun-stat:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .fun-stat-value {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            line-height: 1;
        }

        .fun-stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }

        .modal-content {
            background: #151515;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            margin-bottom: 28px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.75rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .roast-levels {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }

        .roast-level-option {
            padding: 20px;
            background: rgba(10, 10, 10, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .roast-level-option:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
        }

        .roast-level-option.selected {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }

        .roast-level-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .roast-level-emoji {
            font-size: 1.75rem;
        }

        .roast-level-name {
            font-size: 1.125rem;
            font-weight: 800;
            color: #fff;
        }

        .roast-level-description {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .roast-level-example {
            background: #0a0a0a;
            border-left: 3px solid #D4AF37;
            padding: 14px;
            font-size: 0.85rem;
            color: #aaa;
            font-style: italic;
            border-radius: 6px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            font-size: 0.95rem;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.12);
            color: #888;
        }

        .btn-secondary:hover {
            border-color: #D4AF37;
            color: #D4AF37;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #0a0a0a;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* Utility Colors */
        .gold-text { color: #D4AF37; }
        .soft-blue-text { color: #89ABE3; }
        .green-text { color: #66BB6A; }
        .red-text { color: #FF6B6B; }
        .purple-text { color: #9C27B0; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        /* Mobile Optimizations - NO HEAVY ANIMATIONS */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .main-nav {
                gap: 6px;
                padding: 6px;
            }

            .nav-link {
                padding: 10px 16px;
                font-size: 13px;
            }

            .settings-btn {
                width: 100%;
                justify-content: center;
                margin-left: 0;
            }

            .current-roast-indicator {
                width: 100%;
                justify-content: center;
            }

            .header-title {
                font-size: 1.75rem;
            }

            .header-subtitle {
                font-size: 1rem;
            }

            .health-score-container {
                padding: 32px 20px;
            }

            .health-circle-container {
                width: 180px;
                height: 180px;
            }

            .health-grade {
                font-size: 3.5rem;
            }

            .health-score-number {
                font-size: 1.125rem;
            }

            .brutal-box {
                padding: 20px;
            }

            .brutal-title {
                font-size: 1.125rem;
            }

            .brutal-text {
                font-size: 1rem;
            }

            .personality-container {
                padding: 24px;
            }

            .personality-type {
                font-size: 1.5rem;
            }

            .personality-description {
                font-size: 1rem;
            }

            .insights-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .insight-card {
                padding: 24px;
            }

            .achievements-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 16px;
            }

            .achievement {
                padding: 16px;
            }

            .achievement-icon {
                font-size: 2.5rem;
            }

            .fun-stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 16px;
            }

            .modal-content {
                padding: 24px;
            }

            .modal-title {
                font-size: 1.5rem;
            }

            /* DISABLE heavy animations on mobile */
            .insight-card:hover,
            .fun-stat:hover,
            .achievement:hover {
                transform: none;
            }

            .trait:hover {
                background: rgba(156, 39, 176, 0.15);
                border-color: rgba(156, 39, 176, 0.3);
            }
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="./insights-app.js"></script>
    <script type="text/babel">
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
