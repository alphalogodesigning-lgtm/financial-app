<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - The Therapy Session</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app-shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #E0E0E0;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Enhanced Navigation */
        .main-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 48px;
            padding: 16px;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 42, 42, 0.5);
            border-radius: 16px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            color: #888;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(255, 215, 0, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-link:hover::before {
            opacity: 1;
        }

        .nav-link:hover {
            border-color: #D4AF37;
            color: #D4AF37;
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #0a0a0a;
            border-color: #D4AF37;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
        }

        .settings-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-btn:hover {
            border-color: #9C27B0;
            color: #9C27B0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.2);
        }

        .current-roast-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #D4AF37;
            font-weight: 600;
            margin-left: auto;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(212, 175, 55, 0); }
        }

        /* Header */
        .header {
            margin-bottom: 48px;
            text-align: center;
        }

        .header-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .header-subtitle {
            color: #888;
            font-size: 1.25rem;
            font-weight: 400;
        }

        /* Health Score - Animated Circle */
        .health-score-container {
            text-align: center;
            margin-bottom: 48px;
            padding: 40px;
            background: rgba(26, 26, 26, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 42, 42, 0.5);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .health-score-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .health-score-wrapper {
            position: relative;
            z-index: 1;
        }

        .health-circle-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 32px;
        }

        .health-circle-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 12;
        }

        .health-circle-progress {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 8px currentColor);
        }

        .health-circle-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .health-grade {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
            animation: fadeInScale 1s ease-out;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .health-score-number {
            font-size: 1.5rem;
            font-weight: 700;
            opacity: 0.7;
        }

        .health-score-label {
            font-size: 1.25rem;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 16px;
        }

        /* Brutal Honesty Box - Enhanced */
        .brutal-box {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.15) 0%, rgba(80, 0, 0, 0.1) 100%);
            border: 2px solid rgba(139, 0, 0, 0.4);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 48px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(139, 0, 0, 0.2);
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brutal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #8B0000, #DC143C, #FF6B6B, #DC143C, #8B0000);
            background-size: 200% 100%;
            animation: gradientFlow 3s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
        }

        .brutal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #FF6B6B;
        }

        .brutal-title span:first-child {
            animation: shake 1s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .brutal-text {
            font-size: 1.25rem;
            line-height: 1.7;
            color: #fff;
            font-weight: 500;
        }

        /* Personality Container - Enhanced */
        .personality-container {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15) 0%, rgba(103, 58, 183, 0.1) 100%);
            border: 2px solid rgba(156, 39, 176, 0.4);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 48px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(156, 39, 176, 0.2);
            animation: slideInUp 0.7s ease-out;
        }

        .personality-type {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #9C27B0 0%, #CE93D8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .personality-description {
            font-size: 1.25rem;
            color: #E0E0E0;
            margin-bottom: 28px;
            line-height: 1.7;
            font-weight: 400;
        }

        .personality-traits {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .trait {
            padding: 10px 20px;
            background: rgba(156, 39, 176, 0.2);
            border: 1px solid rgba(156, 39, 176, 0.5);
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #CE93D8;
            transition: all 0.3s ease;
        }

        .trait:hover {
            background: rgba(156, 39, 176, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
        }

        /* Insights Grid - Enhanced */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .insight-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .insight-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .insight-card:hover::before {
            opacity: 1;
        }

        .insight-card:hover {
            border-color: #D4AF37;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 48px rgba(212, 175, 55, 0.15);
        }

        .insight-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .insight-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
        }

        .insight-description {
            font-size: 1rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .insight-stat {
            font-size: 2.5rem;
            font-weight: 900;
            color: #D4AF37;
            margin-bottom: 16px;
            line-height: 1;
        }

        .insight-recommendation {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid #D4AF37;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #D4AF37;
            line-height: 1.5;
        }

        /* Achievements - Enhanced */
        .achievements-section {
            margin-bottom: 48px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 32px;
            text-align: center;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .achievement {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .achievement.unlocked {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }

        .achievement.locked {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .achievement:hover:not(.locked) {
            transform: translateY(-8px) rotate(-2deg);
            box-shadow: 0 12px 32px rgba(212, 175, 55, 0.3);
        }

        .achievement-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
            display: inline-block;
        }

        .achievement.unlocked .achievement-icon {
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .achievement-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 0.8rem;
            color: #888;
        }

        /* Fun Stats - Enhanced */
        .fun-stats-section {
            margin-bottom: 48px;
        }

        .fun-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .fun-stat {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .fun-stat:hover {
            transform: translateY(-4px);
            border-color: #D4AF37;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
        }

        .fun-stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 12px;
            line-height: 1;
        }

        .fun-stat-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Modal - Enhanced */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-content {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(42, 42, 42, 0.8);
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: slideInModal 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInModal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 12px;
        }

        .modal-subtitle {
            color: #888;
            font-size: 1rem;
        }

        .roast-levels {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .roast-level-option {
            padding: 24px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid #2a2a2a;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .roast-level-option:hover {
            border-color: #D4AF37;
            transform: translateX(8px);
            background: rgba(212, 175, 55, 0.05);
        }

        .roast-level-option.selected {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.2);
        }

        .roast-level-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .roast-level-emoji {
            font-size: 2rem;
        }

        .roast-level-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        .roast-level-description {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .roast-level-example {
            background: #1a1a1a;
            border-left: 3px solid #D4AF37;
            padding: 16px;
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
            border-radius: 6px;
        }

        .modal-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            font-size: 1rem;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #2a2a2a;
            color: #888;
        }

        .btn-secondary:hover {
            border-color: #D4AF37;
            color: #D4AF37;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            color: #0a0a0a;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
        }

        /* Utility Colors */
        .gold-text { color: #D4AF37; }
        .soft-blue-text { color: #89ABE3; }
        .green-text { color: #66BB6A; }
        .red-text { color: #FF6B6B; }
        .purple-text { color: #9C27B0; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .header-title {
                font-size: 2rem;
            }

            .health-circle-container {
                width: 200px;
                height: 200px;
            }

            .health-grade {
                font-size: 4rem;
            }

            .insights-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 28px;
            }

            .nav-links {
                width: 100%;
            }

            .current-roast-indicator {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="./insights-app.js"></script>
    <script type="text/babel">
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
