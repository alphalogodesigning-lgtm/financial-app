<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Center - Financial App</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .main-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding: 8px;
      border-radius: 16px;
      background: rgba(26, 26, 26, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-link {
      text-decoration: none;
      color: #9a9a9a;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      transition: all .2s ease;
    }

    .nav-link:hover { color: #d4af37; background: rgba(212, 175, 55, 0.1); }
    .nav-link.active {
      color: #0a0a0a;
      background: linear-gradient(135deg, #d4af37 0%, #f5cf55 100%);
    }

    .page-header { margin-bottom: 24px; }
    .page-header h1 {
      font-size: clamp(2rem, 4vw, 2.6rem);
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .page-header p { color: #9d9d9d; max-width: 680px; line-height: 1.6; }

    .tabs {
      display: inline-flex;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(18, 18, 18, 0.9);
      margin-bottom: 24px;
      gap: 6px;
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: #9a9a9a;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #fff;
      background: rgba(212, 175, 55, 0.22);
      box-shadow: inset 0 0 0 1px rgba(212, 175, 55, 0.35);
    }

    .help-grid, .support-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(145deg, rgba(24, 24, 24, 0.95), rgba(18, 18, 18, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
    }

    .category-card h2 { color: #fff; margin-bottom: 6px; font-size: 1.1rem; }
    .category-card p { color: #9b9b9b; font-size: 0.92rem; margin-bottom: 14px; }
    .category-card ul { list-style: none; display: grid; gap: 8px; }

    .article-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      color: #e5e5e5;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: left;
    }

    .article-btn:hover {
      border-color: rgba(212, 175, 55, 0.35);
      background: rgba(212, 175, 55, 0.08);
    }

    .support-card { display: grid; gap: 10px; align-content: start; }
    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 18px;
      margin-bottom: 2px;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .card-icon.email { background: linear-gradient(135deg, rgba(93, 173, 226, 0.3), rgba(93, 173, 226, 0.12)); }
    .card-icon.feedback { background: linear-gradient(135deg, rgba(244, 208, 63, 0.3), rgba(244, 208, 63, 0.12)); }
    .card-icon.bug { background: linear-gradient(135deg, rgba(236, 112, 99, 0.3), rgba(236, 112, 99, 0.12)); }

    .support-card h3 { color: #fff; font-size: 1.02rem; }
    .support-card p { color: #a6a6a6; font-size: 0.92rem; line-height: 1.5; }
    .support-card label { font-size: 0.8rem; color: #9e9e9e; }
    .support-card input,
    .support-card textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-family: inherit;
    }

    .support-card input:focus,
    .support-card textarea:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.45);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
    }

    .rating-readout { color: #bdbdbd; font-size: 0.85rem; }

    .ghost-btn {
      margin-top: 4px;
      justify-self: start;
      padding: 8px 12px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      color: #e8e8e8;
      font-weight: 600;
      cursor: pointer;
    }

    .ghost-btn:hover {
      border-color: rgba(212, 175, 55, 0.35);
      background: rgba(212, 175, 55, 0.08);
      color: #fff;
    }
    @media (max-width: 768px) {
      .main-nav {
        display: none;
      }

      .container {
        padding-top: 24px;
      }

      .page-header {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./help-center-app.js"></script>
</body>
</html>
